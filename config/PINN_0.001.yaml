behaviors:
  CarBrain:
    trainer_type: ppo

    hyperparameters:
      batch_size: 256
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

      physics_loss_strength: 0.001

      physics_velocity_scale_mps: 11.111111
      physics_yaw_rate_norm: 5.0
      physics_wheel_base: 3.102
      physics_max_steer_angle_deg: 45.0
      physics_understeer_k: 0.003
      physics_yaw_min_speed_mps: 1.0
      physics_yaw_speed_temperature: 0.5

    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 500000
    time_horizon: 64
    summary_freq: 5000
